name: CI

on:
  push:
    branches: [develop]
  pull_request:

jobs:
  ci:
    name: Test & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --dev

      - name: Run tests
        run: bun test --recursive

      - name: Type-check
        run: |
          bunx tsc -p packages/core/tsconfig.json --noEmit
          bunx tsc -p packages/auth/tsconfig.json --noEmit
          bunx tsc -p packages/logging/tsconfig.json --noEmit
          bunx tsc -p packages/middleware/tsconfig.json --noEmit
          bunx tsc -p packages/create/tsconfig.json --noEmit
          bunx tsc -p packages/http/tsconfig.json --noEmit

      - name: Build
        run: bun run build