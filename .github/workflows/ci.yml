name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Test & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test --recursive

      - name: Type-check
        run: bunx tsc -p packages/core/tsconfig.json --noEmit